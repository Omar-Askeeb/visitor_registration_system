name: visitor_badge_app
description: Exhibition Visitor Registration & Badge Printing App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database (Direct)
  mysql_client: ^0.0.27
  bcrypt: ^1.1.3

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # QR/Barcode camera scanner
  mobile_scanner: ^5.1.0

  # PDF generation & printing
  pdf: ^3.10.8
  printing: ^5.12.0

  # Barcode rendering in PDF
  barcode: ^2.2.4

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.2

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
